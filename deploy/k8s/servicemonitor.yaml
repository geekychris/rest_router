# Requires kube-prometheus / prometheus-operator CRDs in the cluster.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rest-router
  namespace: gateway
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: rest-router
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s

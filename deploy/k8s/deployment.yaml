apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-router
  namespace: gateway
  labels:
    app: rest-router
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rest-router
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: rest-router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: rest-router
          image: rest-router:1.0-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_CONFIG_LOCATION
              value: "classpath:/application.yml,/config/application.yml"
            - name: REDIS_HOST
              value: redis-master.gateway.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka.gateway.svc.cluster.local:9092
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rest-router-secrets
                  key: ADMIN_API_KEY
            - name: JAVA_OPTS
              value: "-XX:+UseG1GC -XX:MaxRAMPercentage=70.0 -XX:+ExitOnOutOfMemoryError"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            failureThreshold: 30
            periodSeconds: 2
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          lifecycle:
            preStop:
              exec:
                command: ["sh","-c","sleep 5"]
      volumes:
        - name: config
          configMap:
            name: rest-router-config

apiVersion: v1
kind: ConfigMap
metadata:
  name: rest-router-config
  namespace: gateway
data:
  application.yml: |
    server:
      port: 8080
      shutdown: graceful
    spring:
      application:
        name: rest-router
      lifecycle:
        timeout-per-shutdown-phase: 20s
      data:
        redis:
          host: ${REDIS_HOST}
          port: ${REDIS_PORT:6379}
      kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
      endpoint:
        health:
          probes:
            enabled: true
    router:
      auth:
        enabled: true
        apiKeyHeader: X-API-Key
        storage: redis
      rateLimits:
        backend: redis
        tiers:
          anonymous: { limit: 30,   period: MINUTE }
          basic:     { limit: 600,  period: MINUTE }
          premium:   { limit: 6000, period: MINUTE }
      accessLog:
        enabled: true
        queueCapacity: 20000
        sink: kafka
        kafka:
          topic: gateway-access-log
      admin:
        enabled: true
        apiKey: ${ADMIN_API_KEY}
      services:
        servicea:
          baseUrl: http://servicea
          requireAuth: false
          defaultRateLimit: { limit: 200, period: MINUTE }
          routes:
            - path: /servicea
              targetUrl: http://servicea
              stripPrefix: /servicea
              weight: 100

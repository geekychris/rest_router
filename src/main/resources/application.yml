server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: rest-router
  lifecycle:
    timeout-per-shutdown-phase: 20s
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: "1"
      compression-type: lz4
      properties:
        linger.ms: 10
        batch.size: 65536

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

router:
  auth:
    enabled: true
    apiKeyHeader: X-API-Key
    storage: redis           # in-memory | redis
    bootstrapKeys:
      - id: demo-basic
        key: demo-basic-secret
        principalId: demo-user
        tier: basic
      - id: demo-premium
        key: demo-premium-secret
        principalId: premium-user
        tier: premium

  rateLimits:
    backend: redis           # redis | local
    tiers:
      anonymous:
        limit: 30
        period: MINUTE
      basic:
        limit: 600
        period: MINUTE
      premium:
        limit: 6000
        period: MINUTE

  accessLog:
    enabled: true
    queueCapacity: 10000
    sink: stdout             # kafka | stdout | file | noop
    kafka:
      topic: gateway-access-log
    file:
      path: /var/log/gateway/access.log

  admin:
    enabled: true
    apiKey: ${ADMIN_API_KEY:changeme}

  services:
    servicea:
      baseUrl: http://servicea-backend:8080
      requireAuth: false
      defaultRateLimit:
        limit: 100
        period: MINUTE
      clientRateLimits:
        premium-user:
          limit: 5000
          period: MINUTE
      routes:
        - path: /servicea
          targetUrl: http://servicea-backend-v1:8080
          stripPrefix: /servicea
          weight: 80
        - path: /servicea
          targetUrl: http://servicea-backend-v2:8080
          stripPrefix: /servicea
          weight: 20
          headers:
            x-version: v2
    serviceb:
      baseUrl: http://serviceb-backend:8080
      requireAuth: true
      defaultRateLimit:
        limit: 50
        period: MINUTE
      routes:
        - path: /serviceb
          targetUrl: http://serviceb-backend:8080
          stripPrefix: /serviceb
